x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  app:
    build: .
    # Bind only to loopback — Caddy on the host handles public TLS and
    # reverse-proxies to 127.0.0.1:8000. Exposing on 0.0.0.0 would let
    # an attacker hit the app directly and spoof X-Forwarded-For past
    # uvicorn's --proxy-headers, bypassing per-IP rate limits.
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nemo
      POSTGRES_PASSWORD: nemo
      POSTGRES_DB: nemoflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nemo -d nemoflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backup:
    image: postgres:16-alpine
    volumes:
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
      - pgbackups:/backups
    environment:
      PGPASSWORD: nemo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup service started. Running daily at 03:00 UTC."
        while true; do
          # Compute seconds until next 03:00 UTC using portable shell math
          # (BusyBox date has no -d "tomorrow", BSD has no -d at all).
          H=$$(date -u +%H); M=$$(date -u +%M); S=$$(date -u +%S)
          cur=$$(( 10#$$H * 3600 + 10#$$M * 60 + 10#$$S ))
          target=$$(( 3 * 3600 ))
          if [ "$$cur" -lt "$$target" ]; then
            delta=$$(( target - cur ))
          else
            delta=$$(( 86400 - cur + target ))
          fi
          echo "Next backup in $$delta seconds."
          sleep "$$delta"
          /usr/local/bin/backup-db.sh
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  pgbackups:
